services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      JWT_SECRET: "dev-secret"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/cargotrans?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cargotrans
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cargotrans"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  
  migrate:
    container_name: migrate
    image: migrate/migrate:v4.15.2
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations/:/migrations
    command: [
      "-path", "/migrations/",
      "-database",
      "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-cargotrans}?sslmode=disable",
      "up"
    ]
    env_file:
      - .env

volumes:
  postgres_data:
